<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>《认识颜色》IAP 截图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 640px;
    height: 920px;
    background: #FFFDF9;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 48px;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 12px;
    background: #F28C28;
  }
  .tag {
    position: absolute;
    top: 32px;
    right: 32px;
    background: #F28C28;
    color: white;
    font-size: 22px;
    font-weight: 600;
    padding: 8px 24px;
    border-radius: 999px;
  }
  .book-icon {
    width: 240px;
    height: 300px;
    background: #FFF9F2;
    border: 3px solid #F0E8DE;
    border-radius: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 48px;
    font-size: 120px;
  }
  .book-title {
    margin-top: 40px;
    font-size: 40px;
    font-weight: 700;
    color: #222222;
    text-align: center;
  }
  .book-desc {
    margin-top: 24px;
    font-size: 26px;
    color: #666666;
    text-align: center;
    line-height: 1.6;
    padding: 0 16px;
  }
  .price-btn {
    margin-top: auto;
    width: 100%;
    height: 96px;
    background: #F28C28;
    color: white;
    border: none;
    border-radius: 999px;
    font-size: 32px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .footer-note {
    margin-top: 24px;
    font-size: 22px;
    color: #999999;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="tag">消耗型</div>
  <div class="book-icon">🎨</div>
  <div class="book-title">《认识颜色》</div>
  <div class="book-desc">AI 定制宝宝专属颜色认知绘本<br>在缤纷世界中快乐学习成长</div>
  <div class="price-btn">¥12.00 购买</div>
  <div class="footer-note">产品 ID: com.shihui.babybook.book003</div>
</body>
</html>
